
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Elementor-like Page Builder</title>
            <style>
                * {
                    box-sizing: border-box;
                    margin: 0;
                    padding: 0;
                }
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, 
                                Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                    line-height: 1.6;
                    color: #333;
                    background-color: #f8f9fa;
                    padding: 20px;
                }
                .container {
                    max-width: 900px;
                    margin: 0 auto;
                    background-color: white;
                    border-radius: 10px;
                    padding: 40px;
                    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                }
                h1, h2, h3, h4, h5, h6 {
                    margin: 0 0 20px 0;
                }
                p {
                    margin: 0 0 15px 0;
                }
                button {
                    transition: all 0.3s ease;
                }
                button:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                }
                img {
                    border-radius: 8px;
                    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                    max-width: 100%;
                    height: auto;
                }
                @media (max-width: 768px) {
                    .container {
                        padding: 20px;
                    }
                }
            </style>
        </head>
        <body>
            <div class="container">
        <h1 style="font-family: 'Arial'; font-size: 16px; font-weight: normal; color: #333333; background-color: transparent; text-align: center; line-height: 1.5; letter-spacing: 0px; text-transform: none; padding: 10px; margin: 15px 0;">测试网页</h1>
<div style="font-family: 'Arial'; font-size: 16px; font-weight: normal; font-style: normal; color: #333333; background-color: transparent; text-align: center; line-height: 1.5; letter-spacing: 0px; text-transform: none; padding: 10px; margin: 15px 0;">这是一个测试网页</div>
<div style="text-align: center; margin: 20px 0;"><img src="https://gamerunwuyazi.github.io/images/2.png" alt="图片" style="max-width: 100%; height: auto; max-height: 200px; width: 300px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"></div>
<div style="font-family: 'Arial'; font-size: 16px; font-weight: normal; font-style: normal; color: #333333; background-color: transparent; text-align: left; line-height: 1.5; letter-spacing: 0px; text-transform: none; padding: 10px; margin: 15px 0;">PCL2是一个Minecraft启动器，可以进行一系列Minecraft操作</div>

            </div>
        </body>
        </html>
